name: Telegram Alerts

on:
  schedule:
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a Telegram alert even if setup is not favorable"
        required: false
        default: "false"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: .alerts_state.json
          key: alerts-state-${{ github.run_id }}
          restore-keys: |
            alerts-state-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run alert check
        env:
          KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python -m src.alerts.check --state .alerts_state.json --force
          else
            python -m src.alerts.check --state .alerts_state.json
          fi
